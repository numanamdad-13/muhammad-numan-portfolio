<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bracketGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Coding Brackets < > -->
  <path d="M 25 30 L 10 50 L 25 70" fill="none" stroke="url(#bracketGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
  <path d="M 75 30 L 90 50 L 75 70" fill="none" stroke="url(#bracketGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />

  <!-- Inner Monogram MN -->
  <path d="M 38 65 V 35 L 50 50 L 62 35 V 65" fill="none" stroke="url(#textGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
</svg>
